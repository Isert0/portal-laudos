<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Laudos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-grid"></div>

  <header class="header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="12" stroke="#00e5c8" stroke-width="1.5"/>
        <circle cx="14" cy="14" r="6" stroke="#00e5c8" stroke-width="1.5" stroke-dasharray="3 2"/>
        <circle cx="14" cy="14" r="2" fill="#00e5c8"/>
        <line x1="14" y1="2" x2="14" y2="6" stroke="#00e5c8" stroke-width="1.5"/>
        <line x1="14" y1="22" x2="14" y2="26" stroke="#00e5c8" stroke-width="1.5"/>
        <line x1="2" y1="14" x2="6" y2="14" stroke="#00e5c8" stroke-width="1.5"/>
        <line x1="22" y1="14" x2="26" y2="14" stroke="#00e5c8" stroke-width="1.5"/>
      </svg>
      <span>Laboratório</span>
    </div>
    <div class="header-tag">Portal de Laudos</div>
  </header>

  <main class="main">
    <div class="hero">
      <p class="hero-eyebrow">Consulta Online</p>
      <h1 class="hero-title">Seus laudos,<br><em>sempre acessíveis</em></h1>
      <p class="hero-sub">Digite o código da amostra para visualizar o resultado e status das análises.</p>
    </div>

    <div class="search-wrapper">
      <div class="search-box" id="searchBox">
        <div class="search-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
            <line x1="11.5" y1="11.5" x2="16" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <input
          type="text"
          id="codigo"
          placeholder="Ex: AM-2024-001"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="btnBuscar" onclick="buscar()">
          <span class="btn-text">Buscar</span>
          <div class="btn-spinner" id="btnSpinner"></div>
        </button>
      </div>
      <p class="search-hint">Pressione <kbd>Enter</kbd> para buscar</p>
    </div>

    <div id="resultado" class="resultado"></div>
  </main>

  <footer class="footer">
    <p>Laboratório · Portal de Resultados · <span id="ano"></span></p>
  </footer>

  <script src="script.js"></script>
  <script>document.getElementById('ano').textContent = new Date().getFullYear();</script>
</body>
</html>
